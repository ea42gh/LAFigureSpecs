name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly render/notebook smoke to catch upstream TeX and notebook drift.
    - cron: "37 9 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MATRIXLAYOUT_REF: main
  JUPYTER_TIKZ_REF: 47ca7ea885075871631852eda1433a695260490a

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "matrixlayout @ git+https://github.com/ea42gh/matrixlayout.git@${MATRIXLAYOUT_REF}"
          python -m pip install -e .[dev]

      - name: Run tests
        run: python -m pytest

      - name: Run coverage report
        if: matrix.python-version == '3.11'
        run: python -m pytest --cov=la_figures --cov-report=term-missing --cov-fail-under=70

  lint:
    name: Static quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and static quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "matrixlayout @ git+https://github.com/ea42gh/matrixlayout.git@${MATRIXLAYOUT_REF}"
          python -m pip install -e .[dev]

      - name: Run ruff
        run: python -m ruff check la_figures tests render_smoke.py

      - name: Run mypy
        run: python -m mypy la_figures

  package:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and check artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m build
          python -m twine check dist/*

      - name: Install wheel and import package
        run: |
          python -m pip install "matrixlayout @ git+https://github.com/ea42gh/matrixlayout.git@${MATRIXLAYOUT_REF}"
          python -m pip install dist/*.whl
          cd /tmp
          python - <<'PY'
          import la_figures as lf

          assert lf.__version__
          assert callable(lf.ge_tbl_spec)
          assert callable(lf.qr_tbl_spec)
          assert callable(lf.eig_tbl_spec)
          assert callable(lf.svd_tbl_spec)
          PY

  render-smoke:
    name: Render smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TeX and SVG toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dvisvgm \
            fonts-lmodern \
            ghostscript \
            latexmk \
            pdf2svg \
            poppler-utils \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures \
            texlive-plain-generic \
            texlive-science

      - name: Install render dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "jupyter-tikz @ git+https://github.com/ea42gh/jupyter-tikz.git@${JUPYTER_TIKZ_REF}"
          python -m pip install "matrixlayout[render] @ git+https://github.com/ea42gh/matrixlayout.git@${MATRIXLAYOUT_REF}"
          python -m pip install -e .[dev]

      - name: Verify required TeX packages
        run: kpsewhich systeme.sty

      - name: Run render smoke
        run: python render_smoke.py

  notebook-smoke:
    name: Binder notebook smoke
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TeX and SVG toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dvisvgm \
            fonts-lmodern \
            ghostscript \
            latexmk \
            pdf2svg \
            poppler-utils \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures \
            texlive-plain-generic \
            texlive-science

      - name: Install notebook dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "jupyter-tikz @ git+https://github.com/ea42gh/jupyter-tikz.git@${JUPYTER_TIKZ_REF}"
          python -m pip install "matrixlayout[render] @ git+https://github.com/ea42gh/matrixlayout.git@${MATRIXLAYOUT_REF}"
          python -m pip install -e .[dev]
          python -m pip install ipykernel ipython nbconvert
          python -m ipykernel install --user --name python3 --display-name "Python 3"

      - name: Verify required TeX packages
        run: kpsewhich systeme.sty

      - name: Execute Binder demo notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute la_figures_demo.ipynb \
            --output /tmp/la_figures_demo.executed.ipynb \
            --ExecutePreprocessor.timeout=300
